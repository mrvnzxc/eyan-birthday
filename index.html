<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Dino Run</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="game" class="game">
      <div id="score" class="score">0</div>
      <div id="startHint" class="start-hint">Press Space to Start</div>

      <div id="track" class="track">
        <div id="player" class="player" aria-label="Runner character">
          <img src="face.jpg" alt="Player face" />
        </div>
      </div>
    </div>

    <div id="overlay" class="overlay hidden" aria-live="polite">
      <div class="overlay-content">
        <h1>Happy 24th Birthday Carl Ian Macapas 🎉</h1>
        <p>Press Space to Restart</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
